name: Android Development Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      EXPO_NO_TELEMETRY: 1
      EXPO_APP_VARIANT: development
      EXPO_ANDROID_PACKAGE: ${{ vars.EXPO_ANDROID_PACKAGE }}
      EXPO_ANDROID_PACKAGE_DEV: ${{ vars.EXPO_ANDROID_PACKAGE_DEV }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
      GRADLE_ARGS: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android build cache
        uses: actions/cache@v4
        with:
          path: ~/.android/build-cache
          key: android-build-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            android-build-cache-${{ runner.os }}-

      - name: Write Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          org.gradle.daemon=true
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError
          EOF

      - name: Build Android development APK
        id: build
        run: npm run build:development:android

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-dev-diagnostics
          path: |
            android/build/reports/**
            android/app/build/reports/**
            android/**/build/tmp/kotlin-classes/**
            android/**/build/*.log
          if-no-files-found: ignore

      - name: Upload development APK
        uses: actions/upload-artifact@v4
        with:
          name: android-development-apk
          path: android/app/build/outputs/apk/debug/*.apk
